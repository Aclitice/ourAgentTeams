leader:
  model: qwen3.5:4b
  provider: ollama
  ollama_base_url: http://127.0.0.1:11434
  fallbacks:
  - model: deepseek-r1:32b
    provider: ollama
  - model: llama3.3:70b
    provider: ollama
  - model: qwen2.5:14b
    provider: ollama
  heartbeat_interval_s: 5
  watchdog_timeout_s: 30
workers:
  local:
  - model: qwen3.5:4b
    provider: ollama
    strengths: [general, coding, reasoning]
  - model: gemma4:e2b
    provider: ollama
    strengths: [creative, knowledge]
  api: []
monitor:
  heartbeat_interval_s: 10
  timeout_threshold_s: 120
  max_retries: 3
cost:
  monthly_budget_usd: 20.0
  importance_threshold_local: 5
  importance_threshold_best: 8
privacy:
  enabled: true
  entities:
  - PERSON
  - EMAIL_ADDRESS
  - PHONE_NUMBER
  - CREDIT_CARD
  - API_KEY
  - PASSWORD
